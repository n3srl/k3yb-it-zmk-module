# k3yb_it.conf — build-time configuration for the k3yb.it shield
#
# Edit this file to enable/disable features, then push to trigger CI build.

# ── Keyboard identity ──────────────────────────────────────────────────────────
CONFIG_ZMK_KEYBOARD_NAME="k3yb.it"

# ── HID / USB ──────────────────────────────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# ── Bluetooth ──────────────────────────────────────────────────────────────────
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Italian accent layer macros ────────────────────────────────────────────────
# The Italian grave/acute layers use Windows Alt+numpad Unicode input.
# NumLock must be ON on the host.  OS keyboard layout must be set to US.
# No extra CONFIG needed for macros or mod-morph — they compile by default.

# ── OLED display (SSD1306 128×32 via I2C) ─────────────────────────────────────
# Uncomment the lines below once the display is physically wired and the
# zmk,display chosen node is uncommented in k3yb_it.overlay.
#
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Custom status screen (src/status_screen.c): N3 boot logo, uptime clock,
# layer, NUM/CAPS/SCRL lock state, WPM, battery
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_WPM=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_48=y

# ── Status LEDs ────────────────────────────────────────────────────────────────
# The 4 status LEDs are driven via CD4052 dual MUX.  A custom ZMK driver or
# an external zmk-module is required to drive them.  The GPIO nodes are
# declared in the overlay; enable the driver module when available.
#
# CONFIG_ZMK_LED_INDICATORS=y  (uncomment when driver is ready)

# ── Power management ───────────────────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
# 15 min idle -> deep sleep
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Logging (disable for release builds to save flash) ────────────────────────
# CONFIG_ZMK_LOG_LEVEL_DBG=y
