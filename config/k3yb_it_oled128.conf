# k3yb_it_oled128.conf — variant with SSD1327 128x128 OLED

# ── HID / USB / BLE ────────────────────────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Display ────────────────────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_WPM=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_48=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_IMG=y

# ── Power management ───────────────────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
# 15 min idle -> deep sleep
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Display thread: full-screen LVGL redraws overflow the 2k default stack
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# Synchronous logging while hunting the display crash (messages would
# otherwise be lost in the deferred buffer when the system dies)
CONFIG_LOG_MODE_IMMEDIATE=y
